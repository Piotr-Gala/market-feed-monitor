services:
  postgres:
    image: postgres:17-alpine
    container_name: market-feed-monitor-postgres
    environment:
      POSTGRES_DB: market_feed_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - market-feed-monitor-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market_feed_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  market-feed-monitor-postgres-data:
